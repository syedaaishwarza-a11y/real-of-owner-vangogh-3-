<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Realm of Honor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#020208;font-family:-apple-system,system-ui,'SF Pro Display',sans-serif;-webkit-text-size-adjust:100%}
#app{position:relative;width:100%;max-width:430px;height:100dvh;margin:0 auto;overflow:hidden;display:flex;flex-direction:column}

/* Canvas layers */
#vg-c{position:fixed;inset:0;z-index:0;max-width:430px;left:50%;transform:translateX(-50%)}
#ly-c{position:fixed;inset:0;z-index:1;pointer-events:none;max-width:430px;left:50%;transform:translateX(-50%);transition:opacity 2.5s ease}
#grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.038;max-width:430px;left:50%;transform:translateX(-50%)}
#bg-c{position:fixed;inset:0;z-index:3;pointer-events:none;max-width:430px;left:50%;transform:translateX(-50%);transition:opacity 2s ease;opacity:0}

/* App shell z=5 */
#app{z-index:5}

/* ─── TYPOGRAPHY ─────────────────────────────────────────── */
.t-hero{font-size:48px;font-weight:800;letter-spacing:-1px;line-height:1}
.t-sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;font-weight:300}
.t-micro{font-size:8px;letter-spacing:3px;text-transform:uppercase;font-weight:400;font-family:monospace}
.t-editorial{font-size:11px;letter-spacing:2px;font-weight:200;line-height:1.8}
.t-poetic{font-size:13px;letter-spacing:1px;font-weight:300;font-style:italic;line-height:1.6;color:rgba(200,210,240,.55)}

/* ─── GLASS SYSTEM ───────────────────────────────────────── */
.glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(255,255,255,0.07)}
.glass-strong{background:rgba(10,10,24,0.82);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,0.09)}
.glass-btn{background:rgba(255,255,255,0.07);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.12);cursor:pointer;-webkit-appearance:none;transition:all .2s}
.glass-btn:active{transform:scale(.93);background:rgba(255,255,255,.14)}

/* ─── GLOW UTILITIES ─────────────────────────────────────── */
.glow-gold{box-shadow:0 0 20px rgba(212,175,55,.25),0 0 60px rgba(212,175,55,.08)}
.glow-pink{box-shadow:0 0 20px rgba(255,100,150,.3),0 0 60px rgba(255,100,150,.1)}
.glow-blue{box-shadow:0 0 20px rgba(100,140,255,.25),0 0 60px rgba(100,140,255,.08)}

/* ─── SCROLLING ──────────────────────────────────────────── */
.scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scr::-webkit-scrollbar{width:0}

/* ─── ANIMATIONS ─────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(-6px)}50%{transform:translateY(6px)}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.04);opacity:1}}
@keyframes scanH{0%{transform:translateY(0)}100%{transform:translateY(210px)}}
@keyframes reticle{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes pulseRing{0%{transform:scale(.8);opacity:.8}100%{transform:scale(1.6);opacity:0}}
@keyframes shimmer{0%{background-position:-400% 0}100%{background-position:400% 0}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes grainMove{0%,100%{transform:translate(0,0)}25%{transform:translate(-1%,1%)}50%{transform:translate(1%,-1%)}75%{transform:translate(-1%,-1%)}}}
@keyframes orbitSlow{from{transform:rotate(0) translateX(22px) rotate(0)}to{transform:rotate(360deg) translateX(22px) rotate(-360deg)}}
@keyframes chromaticShift{0%,100%{text-shadow:-.5px 0 #ff3377,.5px 0 #3390ff}50%{text-shadow:.5px 0 #ff3377,-.5px 0 #3390ff}}
@keyframes filmGrain{0%{opacity:.04}50%{opacity:.06}100%{opacity:.04}}
@keyframes cameraShake{0%{transform:translate(0,0) scale(var(--zoom,1))}15%{transform:translate(-4px,-3px) scale(var(--zoom,1))}30%{transform:translate(3px,4px) scale(var(--zoom,1))}45%{transform:translate(-3px,2px) scale(var(--zoom,1))}60%{transform:translate(2px,-3px) scale(var(--zoom,1))}75%{transform:translate(-1px,2px) scale(var(--zoom,1))}100%{transform:translate(0,0) scale(var(--zoom,1))}}
@keyframes flashBurst{0%{opacity:0}10%{opacity:.9}100%{opacity:0}}
@keyframes faceBox{0%,100%{border-color:rgba(99,255,180,.7)}50%{border-color:rgba(99,255,180,1)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes zoomIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}

/* Entry */
.btn-enter{width:100%;padding:16px;background:linear-gradient(135deg,#d4af37 0%,#f5dc80 50%,#d4af37 100%);background-size:200% 100%;animation:shimmer 3s ease infinite;color:#0a0600;font-weight:800;font-size:15px;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;clip-path:polygon(10px 0%,100% 0%,100% calc(100% - 10px),calc(100% - 10px) 100%,0% 100%,0% 10px);-webkit-appearance:none}
.btn-wire{width:100%;padding:13px;background:transparent;color:rgba(212,175,55,.65);border:1px solid rgba(212,175,55,.28);font-size:13px;letter-spacing:2px;cursor:pointer;-webkit-appearance:none}

/* Nav */
.nav{flex-shrink:0;display:flex;align-items:center;justify-content:space-around;padding:8px 4px max(8px,env(safe-area-inset-bottom,8px));background:rgba(4,4,12,.88);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-top:1px solid rgba(255,255,255,.06)}
.nbt{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 0;-webkit-appearance:none;transition:transform .15s}
.nbt:active{transform:scale(.88)}

/* Topbar */
.topbar{flex-shrink:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(4,4,12,.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.05)}

/* Grain canvas style */
#grain{animation:filmGrain 3s ease-in-out infinite}

/* World screen overlay */
#world-overlay{position:fixed;inset:0;z-index:7;max-width:430px;left:50%;transform:translateX(-50%);pointer-events:none;opacity:0;transition:opacity 1.4s ease}
@keyframes worldChapter{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes worldPulse{0%,100%{text-shadow:0 0 20px rgba(100,255,200,.3)}50%{text-shadow:0 0 44px rgba(100,255,200,.7),0 0 80px rgba(100,255,200,.18)}}
@keyframes worldMicro{0%,100%{opacity:.35}50%{opacity:.7}}
@keyframes particleDrift{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes holdGlow{0%{box-shadow:0 0 20px rgba(80,220,180,.3)}100%{box-shadow:0 0 80px rgba(80,220,180,.9),0 0 160px rgba(80,220,180,.3)}}
@keyframes rippleOut{0%{transform:scale(0);opacity:.8}100%{transform:scale(3);opacity:0}}
</style>
</head>

/* ── HELPERS ────────────────────────────────────────────────────── */
function ini(n){return n.split(' ').map(function(w){return w[0];}).slice(0,2).join('');}
function fmt(n){return n>=1000?(n/1000).toFixed(1)+'k':String(n);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function korb(k,sz){sz=sz||38;return'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;flex-shrink:0;background:'+k.gc+';display:flex;align-items:center;justify-content:center;font-size:'+Math.round(sz*.32)+'px;font-weight:800;color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.1),0 4px 16px '+k.cc+'44">'+ini(k.name)+'</div>';}

/* ── NAVIGATION ─────────────────────────────────────────────────── */
function go(sc){
  if(S.screen==='lens'&&sc!=='lens'&&S.lensStream){S.lensStream.getTracks().forEach(function(t){t.stop();});S.lensStream=null;S.lensActive=false;}
  S.screen=sc;if(MAIN.indexOf(sc)>=0)S.tab=sc;
  var iE=(sc==='entry');
  var isFeed=(sc==='feed');
  document.getElementById('bg-c').style.opacity=(iE||isFeed)?'0':'1';
  document.getElementById('ly-c').style.opacity=iE?'1':'0.06';
  document.getElementById('vg-c').style.opacity=iE?'1':'0.14';
  /* World engine toggle */
  var wc=document.getElementById('world-c');
  var wb=document.getElementById('world-bloom');
  var wt=document.getElementById('world-text');
  if(isFeed){wc.style.opacity='1';wb.style.opacity='1';wt.style.opacity='1';wc.style.pointerEvents='all';if(window._worldActivate)window._worldActivate();}
  else{wc.style.opacity='0';wb.style.opacity='0';wt.style.opacity='0';wc.style.pointerEvents='none';if(window._worldDeactivate)window._worldDeactivate();}
  render();
}
function goBack(){var b={conversation:'messages',messages:'feed',notifications:'feed'};go(b[S.screen]||'feed');}

    '<div class="scr" style="padding:12px 14px 80px">'+content+'</div>'+

var faceModel=null,faceDetectRAF=null,lutRenderer=null,lutScene=null,lutCam=null,lutMesh=null,lutComposer=null;
var LENS_AI_HINTS=['✦ Perfect lighting','✦ Centering subject','✦ Depth optimal','✦ Focus locked','✦ Aura strong','✦ Light balanced','✦ Ready to capture'];

function startLens(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){S.lensError='Camera API unavailable.\n\niPhone → Safari\nAndroid → Chrome';render();return;}
  S.lensActive=true;S.lensError=null;S.lensZoom=1.0;S.lensFaces=[];render();
  setTimeout(function(){
    var v=document.getElementById('lens-video');
    if(!v){S.lensActive=false;S.lensError='Video mount failed. Retry.';render();return;}
    function tryC(c){
      navigator.mediaDevices.getUserMedia(c).then(function(stream){
        S.lensStream=stream;v.srcObject=stream;v.muted=true;
        var p=v.play();if(p)p.catch(function(){v.addEventListener('click',function(){v.play().catch(function(){});},{once:true});});
        // Start subsystems
        initGrainLoop();
        initZoomGestures();
        initLUTOverlay();
        loadFaceDetector();
        aiHintLoop();
      }).catch(function(e){
        if(e.name==='OverconstrainedError'&&c.video&&c.video.facingMode){tryC({video:true,audio:false});return;}
        var m=e.name==='NotAllowedError'?'Permission denied.\n\niPhone: Settings → Safari → Camera → Allow\nAndroid: tap 🔒 → Camera → Allow':
              e.name==='NotFoundError'?'No camera found on this device.':
              e.name==='NotReadableError'?'Camera in use — close other apps.':
              'Camera error: '+e.message+'\n('+e.name+')';
        S.lensActive=false;S.lensError=m;render();
      });
    }
    var facing=S.lensFacing==='front'?'user':'environment';
    tryC({video:{facingMode:{ideal:facing},width:{ideal:1280},height:{ideal:720}},audio:false});
  },220);
}

function stopLens(){
  cancelAnimationFrame(faceDetectRAF);faceDetectRAF=null;
  if(S.lensStream)S.lensStream.getTracks().forEach(function(t){t.stop();});
  if(lutRenderer){try{lutRenderer.dispose();}catch(e){}}
  lutRenderer=null;lutScene=null;lutCam=null;lutMesh=null;lutComposer=null;faceModel=null;
  S.lensStream=null;S.lensActive=false;S.lensScanning=false;S.lensScan=null;S.lensFaces=[];S.lensFlash=false;
  render();
}

function flipCamera(){

/* ── CAPTURE PIPELINE ─────────────────────────────────────────── */
function captureFrame(){
  var v=document.getElementById('lens-video');
  if(!v||!S.lensStream)return;
  // Camera shake effect
  triggerShake();
  // Flash burst
  S.lensFlash=true;setTimeout(function(){S.lensFlash=false;},180);
  setTimeout(function(){
    // Draw frame to offscreen canvas with LUT applied
    var W=v.videoWidth||1280,H=v.videoHeight||720;
    var cap=document.createElement('canvas');cap.width=W;cap.height=H;
    var ctx=cap.getContext('2d');
    // Apply zoom + mirror
    var flip=S.lensFacing==='front';
    ctx.save();
    if(flip){ctx.translate(W,0);ctx.scale(-1,1);}
    var s=S.lensZoom;ctx.translate(W/2,H/2);ctx.scale(s,s);ctx.drawImage(v,-W/2,-H/2,W,H);
    ctx.restore();
    // Apply LUT-style pixel color grade
    applyLUTPixels(ctx,W,H,S.lensFilter);
    // Add film grain to capture
    addGrainToCanvas(ctx,W,H,0.035);
    var dataURL=cap.toDataURL('image/jpeg',0.92);
    S.lensCaptures.unshift(dataURL);
    if(S.lensCaptures.length>48)S.lensCaptures.pop();
    S.lensPreview=dataURL;
    render();
    // Re-attach stream
    setTimeout(function(){var vv=document.getElementById('lens-video');if(vv&&S.lensStream){vv.srcObject=S.lensStream;vv.play().catch(function(){});}},80);
  },60);
}

/* Apply LUT-style colour grade to ImageData using matrix presets */
function applyLUTPixels(ctx,W,H,filterIdx){
  var names=['cinematic','noir','glow','film','ethereal'];
  var preset=LUT_PRESETS[names[filterIdx]]||LUT_PRESETS.cinematic;
  var imgData=ctx.getImageData(0,0,W,H);var d=imgData.data;
  var r=preset.r,g=preset.g,b=preset.b,lf=preset.lift,gm=1/preset.gamma,sat=preset.sat;
  for(var i=0;i<d.length;i+=4){
    var ri=d[i]/255,gi=d[i+1]/255,bi=d[i+2]/255;
    // Matrix multiply
    var ro=ri*r[0]+gi*r[1]+bi*r[2]+lf[0];
    var go=ri*g[0]+gi*g[1]+bi*g[2]+lf[1];
    var bo=ri*b[0]+gi*b[1]+bi*b[2]+lf[2];
    // Gamma
    ro=Math.pow(Math.max(0,ro),gm);go=Math.pow(Math.max(0,go),gm);bo=Math.pow(Math.max(0,bo),gm);
    // Saturation
    var lum=ro*.299+go*.587+bo*.114;
    ro=lum+(ro-lum)*sat;go=lum+(go-lum)*sat;bo=lum+(bo-lum)*sat;
    d[i]=Math.min(255,Math.max(0,ro*255));d[i+1]=Math.min(255,Math.max(0,go*255));d[i+2]=Math.min(255,Math.max(0,bo*255));
  }
  ctx.putImageData(imgData,0,0);
  // Vignette
  var grad=ctx.createRadialGradient(W/2,H/2,H*.28,W/2,H/2,H*.72);
  grad.addColorStop(0,'transparent');grad.addColorStop(1,'rgba(0,0,0,.52)');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
}

function addGrainToCanvas(ctx,W,H,amt){
  var imgData=ctx.getImageData(0,0,W,H);var d=imgData.data;
  for(var i=0;i<d.length;i+=4){var noise=(Math.random()-.5)*255*amt;d[i]+=noise;d[i+1]+=noise;d[i+2]+=noise;}
  ctx.putImageData(imgData,0,0);
}

function saveCapture(){
  if(!S.lensPreview)return;

/* ── CAMERA SHAKE ─────────────────────────────────────────────── */
function triggerShake(){
  var v=document.getElementById('lens-video');
  if(!v)return;
  var flip=S.lensFacing==='front'?-1:1;
  v.style.transition='transform 0s';
  v.style.animation='cameraShake .28s cubic-bezier(.36,.07,.19,.97)';
  setTimeout(function(){
    v.style.animation='';
    v.style.transition='transform .15s cubic-bezier(.25,.46,.45,.94)';
    v.style.transform='scale('+(flip*S.lensZoom)+','+S.lensZoom+')';
  },300);
}

/* ── ZOOM GESTURES ────────────────────────────────────────────── */
function initZoomGestures(){
  var wrap=document.getElementById('lens-wrap');if(!wrap)return;
  var startY=0,startPinch=0,startZoom=S.lensZoom,pinching=false;
  var lastTouches=[];
  function dist(a,b){return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}
  function onTS(e){
    if(e.touches.length===2){pinching=true;startPinch=dist(e.touches[0],e.touches[1]);startZoom=S.lensZoom;}
    else if(e.touches.length===1){startY=e.touches[0].clientY;pinching=false;}
    lastTouches=Array.from(e.touches);
  }
  function onTM(e){
    e.preventDefault();
    if(e.touches.length===2&&pinching){
      var d=dist(e.touches[0],e.touches[1]);
      var nz=Math.min(4,Math.max(1,startZoom*(d/startPinch)));
      setZoom(nz);
    }else if(e.touches.length===1&&!pinching){
      var dy=startY-e.touches[0].clientY;
      var nz=Math.min(4,Math.max(1,startZoom+dy*.008));
      setZoom(nz);
    }
  }
  wrap.addEventListener('touchstart',onTS,{passive:true});
  wrap.addEventListener('touchmove',onTM,{passive:false});
}

function setZoom(z){
  S.lensZoom=Math.round(z*10)/10;
  var v=document.getElementById('lens-video');
  var flip=S.lensFacing==='front'?-1:1;
  if(v){v.style.transform='scale('+(flip*S.lensZoom)+','+S.lensZoom+')';v.style.transition='transform .12s cubic-bezier(.25,.46,.45,.94)';}
  // Update zoom label without re-render
  var zl=document.querySelector('#lens-wrap div[style*="fbbf24"]');
  if(zl)zl.textContent=S.lensZoom.toFixed(1)+'×';
  // Update thumb
  var thumb=document.getElementById('zoom-thumb');
  if(thumb)thumb.style.top=(100-((S.lensZoom-1)/3)*100)+'%';
}

/* ── FACE DETECTION (MediaPipe BlazeFace via TF.js) ───────────── */
function loadFaceDetector(){
  // Lazy-load TF.js + BlazeFace from CDN
  if(typeof tf!=='undefined'&&typeof blazeface!=='undefined'){startFaceLoop();return;}
  var tfScript=document.createElement('script');
  tfScript.src='https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js';
  tfScript.onload=function(){
    var bfScript=document.createElement('script');
    bfScript.src='https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js';
    bfScript.onload=function(){
      blazeface.load({maxFaces:4}).then(function(model){
        faceModel=model;
        var fp=document.getElementById('face-pill');
        if(fp){fp.textContent='● FACE AI ON';fp.style.color='rgba(99,255,180,.9)';fp.style.borderColor='rgba(99,255,180,.4)';}
        startFaceLoop();
      }).catch(function(){
        var fp=document.getElementById('face-pill');
        if(fp){fp.textContent='○ FACE AI OFF';fp.style.color='rgba(100,116,139,.6)';}
      });
    };
    bfScript.onerror=function(){var fp=document.getElementById('face-pill');if(fp)fp.textContent='○ MODEL ERR';};
    document.head.appendChild(bfScript);
  };
  tfScript.onerror=function(){var fp=document.getElementById('face-pill');if(fp)fp.textContent='○ TF ERR';};
  document.head.appendChild(tfScript);
}

function startFaceLoop(){
  var v=document.getElementById('lens-video');
  var fc=document.getElementById('face-canvas');
  if(!v||!fc||!faceModel){return;}
  (function detectLoop(){
    if(S.screen!=='lens'||!S.lensActive||!faceModel){return;}
    faceDetectRAF=requestAnimationFrame(detectLoop);
    if(v.readyState<2)return;
    faceModel.estimateFaces(v,false).then(function(preds){
      S.lensFaces=preds.map(function(p){
        return {x:p.topLeft[0],y:p.topLeft[1],w:p.bottomRight[0]-p.topLeft[0],h:p.bottomRight[1]-p.topLeft[1],score:p.probability?p.probability[0]:1,landmarks:p.landmarks||[]};
      });
      drawFaceOverlay(fc,v);
      // Update face count pill
      var fp=document.getElementById('face-pill');
      if(fp&&preds.length>0){
        fp.textContent='● '+preds.length+' FACE'+(preds.length>1?'S':'');
        fp.style.animation='faceBox 1.8s ease-in-out infinite';
      }else if(fp){fp.textContent='● SCANNING';fp.style.animation='';}
      // AI hint
      if(preds.length>0){S.lensAIHint=LENS_AI_HINTS[Math.floor(Math.random()*LENS_AI_HINTS.length)];var ah=document.getElementById('ai-hint');if(ah)ah.textContent=S.lensAIHint;}
    }).catch(function(){});
  })();
}

function drawFaceOverlay(canvas,video){
  var W=video.offsetWidth||window.innerWidth,H=video.offsetHeight||window.innerHeight;
  if(canvas.width!==W)canvas.width=W;if(canvas.height!==H)canvas.height=H;
  var ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
  // Scale factor from video intrinsic to display
  var vW=video.videoWidth||1280,vH=video.videoHeight||720;
  var sx=W/vW,sy=H/vH;
  var t=performance.now()/1000;
  S.lensFaces.forEach(function(face,fi){
    var fx=face.x*sx,fy=face.y*sy,fw=face.w*sx,fh=face.h*sy;
    // Animated glow box
    var pulse=.7+Math.sin(t*3+fi)*.25;
    ctx.strokeStyle='rgba(99,255,180,'+pulse+')';ctx.lineWidth=1.5;
    ctx.shadowColor='rgba(99,255,180,.6)';ctx.shadowBlur=8;
    // Corner brackets only (more elegant than full rect)
    var cs=Math.min(fw,fh)*.22;
    [[fx,fy],[fx+fw,fy],[fx,fy+fh],[fx+fw,fy+fh]].forEach(function(c,ci){
      var sx2=ci%2===0?1:-1,sy2=ci<2?1:-1;
      ctx.beginPath();ctx.moveTo(c[0]+sx2*cs,c[1]);ctx.lineTo(c[0],c[1]);ctx.lineTo(c[0],c[1]+sy2*cs);ctx.stroke();
    });
    ctx.shadowBlur=0;
    // Confidence score
    var conf=Math.round((face.score||1)*100);
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(fx,fy-18,60,14);
    ctx.fillStyle='rgba(99,255,180,.85)';ctx.font='9px monospace';ctx.textAlign='left';ctx.fillText('FACE '+conf+'%',fx+4,fy-8);
    // Eye landmarks
    if(face.landmarks&&face.landmarks.length>=2){
      [[0,'rgba(255,220,60,.7)'],[1,'rgba(255,220,60,.7)']].forEach(function(lm){
        var pt=face.landmarks[lm[0]];if(!pt)return;
        var lx=pt[0]*sx,ly=pt[1]*sy;
        ctx.strokeStyle=lm[1];ctx.lineWidth=1;ctx.shadowColor=lm[1];ctx.shadowBlur=6;
        ctx.beginPath();ctx.arc(lx,ly,4,0,6.28);ctx.stroke();
        // Eye cross
        ctx.beginPath();ctx.moveTo(lx-7,ly);ctx.lineTo(lx+7,ly);ctx.stroke();
        ctx.beginPath();ctx.moveTo(lx,ly-7);ctx.lineTo(lx,ly+7);ctx.stroke();
      });
    }
    // Tracking line from center
    var cx2=fx+fw/2,cy2=fy+fh/2;
    ctx.setLineDash([3,5]);ctx.strokeStyle='rgba(99,255,180,.18)';ctx.lineWidth=1;ctx.shadowBlur=0;
    ctx.beginPath();ctx.moveTo(W/2,H/2);ctx.lineTo(cx2,cy2);ctx.stroke();ctx.setLineDash([]);
  });
  // Default reticle when no faces
  if(S.lensFaces.length===0){
    var cx3=W/2,cy3=H/2,sz=96;var ret=.55+Math.sin(t*1.8)*.22;
    ctx.strokeStyle='rgba(255,255,255,'+ret+')';ctx.lineWidth=1.5;ctx.shadowColor='rgba(255,255,255,.3)';ctx.shadowBlur=4;

/* ── LUT WEBGL OVERLAY ────────────────────────────────────────── */
function initLUTOverlay(){
  // Load Three.js if needed then init
  if(typeof THREE!=='undefined'){buildLUTRenderer();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
  s.onload=function(){buildLUTRenderer();};
  document.head.appendChild(s);
}

function buildLUTRenderer(){
  var c=document.getElementById('lut-canvas');if(!c)return;
  var W=c.offsetWidth||window.innerWidth,H=c.offsetHeight||window.innerHeight;
  if(lutRenderer){try{lutRenderer.dispose();}catch(e){}}
  var R=new THREE.WebGLRenderer({canvas:c,alpha:true,preserveDrawingBuffer:false,powerPreference:'low-power'});
  R.setSize(W,H,false);R.setPixelRatio(1);lutRenderer=R;
  var sc=new THREE.Scene();lutScene=sc;
  var cam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);lutCam=cam;
  var LUTS=['cinematic','noir','glow','film','ethereal'];
  var LUT_FRAG='precision mediump float;uniform float uTime;uniform int uMode;varying vec2 vUv;'+
    'void main(){'+
    'vec2 uv=vUv;'+
    'vec3 col=vec3(0.);'+
    'if(uMode==0){col=vec3(uv.y*.05,uv.y*.15,uv.x*.18);}'+  // cinematic — cool teal shadow
    'else if(uMode==1){float g=dot(uv,vec2(.5,.5))*.08;col=vec3(g);}'+  // noir — grey
    'else if(uMode==2){col=vec3(uv.x*.06,uv.y*.04,uv.y*.18);}'+  // glow — purple tint
    'else if(uMode==3){col=vec3(uv.y*.12,uv.y*.06,0.);}'+  // film — warm sepia
    'else{col=vec3(uv.x*.04,uv.y*.08,uv.y*.14);}'+  // ethereal — cool blue
    'float vig=1.-smoothstep(.3,1.1,length(uv-.5)*1.6);'+
    'col*=vig;'+
    'float scan=sin(uv.y*600.+uTime*.5)*.009;col+=scan;'+  // subtle scan lines
    'gl_FragColor=vec4(col,.22);}';
  var mat=new THREE.ShaderMaterial({uniforms:{uTime:{value:0},uMode:{value:S.lensFilter}},vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.);}',fragmentShader:LUT_FRAG,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false});
  lutMesh=new THREE.Mesh(new THREE.PlaneGeometry(2,2),mat);sc.add(lutMesh);
  var clk=new THREE.Clock();
  (function lutLoop(){
    if(!lutRenderer||S.screen!=='lens')return;
    requestAnimationFrame(lutLoop);
    mat.uniforms.uTime.value=clk.getElapsedTime();
    mat.uniforms.uMode.value=S.lensFilter;
    R.render(sc,cam);
  })();
}
